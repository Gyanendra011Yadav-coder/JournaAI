          - "https://www.modernhealthcare.com/feed/rss"
        "Education":
          - "https://www.edweek.org/education/rss"
          - "https://hechingerreport.org/feed/"
        "Steel":
          - "https://www.worldsteel.org/rss.xml"
          - "https://www.steel.org/feed/"
        "Finance/BFSI":
