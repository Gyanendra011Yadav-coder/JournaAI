spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prcontrol
    username: prcontrol
    password: prcontrol
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
app:
  cors:
    allowedOrigins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
  beats:
    - name: "Law"
      slug: "law"
      terms:
        - "law"
    - name: "Taxation"
      slug: "taxation"
      terms:
        - "taxation"
    - name: "Healthcare"
      slug: "healthcare"
      terms:
        - "healthcare"
    - name: "Education"
      slug: "education"
      terms:
        - "education"
    - name: "Steel"
      slug: "steel"
      terms:
        - "steel industry"
    - name: "Finance & Banking"
      slug: "finance-banking"
      terms:
        - "financial services"
        - "investment banking"
    - name: "Technology & AI"
      slug: "technology-ai"
      terms:
        - "technology sector"
        - "artificial intelligence"
    - name: "Telecom"
      slug: "telecom"
      terms:
        - "telecom"
    - name: "Energy"
      slug: "energy"
      terms:
        - "energy industry"
    - name: "Entertainment"
      slug: "entertainment"
      terms:
        - "entertainment industry"
        - "streaming media"
    - name: "Manufacturing"
      slug: "manufacturing"
      terms:
        - "manufacturing"
    - name: "Startups & VC"
      slug: "startups-vc"
      terms:
        - "startup funding"
        - "venture capital"
    - name: "Pharma & MedTech"
      slug: "pharma-medtech"
      terms:
        - "pharmaceutical industry"
        - "medical technology"
    - name: "Real Estate & Infrastructure"
      slug: "real-estate-infra"
      terms:
        - "real estate"
        - "infrastructure projects"
    - name: "Consumer & Retail"
      slug: "consumer-retail"
      terms:
        - "consumer goods"
        - "retail industry"
    - name: "Automotive & EV"
      slug: "auto-ev"
      terms:
        - "automotive industry"
        - "electric vehicle"
  jwt:
    secret: "change-me-change-me-change-me-change-me"
    expirationSeconds: 3600
  news:
    ttlMinutes: 15
    failureThreshold: 3
    circuitMinutes: 30
    searchesPerMinute: 60
    refreshIntervalMinutes: 30
    scheduled:
      enabled: false
      fixedDelayMs: 600000
    gnews:
      baseUrl: "https://gnews.io/api/v4"
      apiKeyBase64: "MDlmZjdmNjJlNDQyYmViZTc2YzYzMDJmYWUzZTc4ZmI="
      requestTimeoutSeconds: 10
      maxBackoffSeconds: 30
  search:
    google:
      apiKeyBase64: "QUl6YVN5QTg0QzFyamM3elZNU1EwbGFWVU5LOTNyR1VOUDRPMnNR"
      searchEngineId: "01f32d91ca0e847db"
      baseUrl: "https://www.googleapis.com/customsearch/v1"
      requestTimeoutSeconds: 10
      maxResults: 5
      defaultLang: "en"
      defaultCountry: "us"
      allowedDomains: "*"
  enrichment:
    htmlCacheMinutes: 60
    perDomainDelayMs: 1500
    requestTimeoutSeconds: 10
    autoRunAfterIngest: true
    playwrightEnabled: true
    playwrightTimeoutSeconds: 15
    playwrightPostLoadDelayMs: 1000
    playwrightMinHtmlChars: 2500
    scheduled:
      enabled: true
      fixedDelayMs: 600000
    runner:
      batchSize: 50
      reviewBatchSize: 10
      oldPendingBatchSize: 10
      maxConcurrentTasks: 4
  journalist-cleanup:
    enabled: true
    fixedDelayMs: 600000
    batchSize: 200
  llm:
    enabled: true
    seed:
      enabled: true
      updateExisting: true
    providerOrder:
      - "GROQ"
      - "CHATGPT"
    authorExtraction:
      enabled: true
      cacheDays: 7
      maxAttempts: 2
      cooldownMinutes: 60
      maxTokens: 512
      temperature: 0.2
    circuitBreaker:
      failureThreshold: 3
      openMinutes: 20
    providers:
      - name: "GEMINI"
        enabled: false
        baseUrl: "https://generativelanguage.googleapis.com/v1/models/{{MODEL}}:generateContent"
        authType: "API_KEY_HEADER"
        authHeaderName: "x-goog-api-key"
        apiKeyBase64: "QUl6YVN5Q2djN1Z0Tm1KcC03dkdPcUVidUc0QWllb1pCdDBLR1RB"
        model: "gemini-1.5-flash"
        timeoutMs: 12000
        responseJsonpath: "$.candidates[0].content.parts[0].text"
        requestTemplate:
          contents:
            - role: "user"
              parts:
                - text: "{{SYSTEM_PROMPT}}\n\n{{USER_PROMPT}}"
          generationConfig:
            temperature: "{{TEMPERATURE}}"
            maxOutputTokens: "{{MAX_TOKENS}}"
        retryPolicy:
          maxRetries: 2
          retryableStatusCodes:
            - 408
            - 429
            - 500
            - 502
            - 503
            - 504
      - name: "GROQ"
        enabled: true
        baseUrl: "https://api.groq.com/openai/v1/chat/completions"
        authType: "BEARER"
        apiKeyBase64: "Z3NrX1FXYTdDMmZXcm9EcTJkRzVRN0JHV0dkeWIzRlk4djBvOUxFWFFIYU9ndVFPN21DWDhjc0U="
        model: "llama-3.1-8b-instant"
        timeoutMs: 12000
        responseJsonpath: "$.choices[0].message.content"
        requestTemplate:
          model: "{{MODEL}}"
          messages:
            - role: "system"
              content: "{{SYSTEM_PROMPT}}"
            - role: "user"
              content: "{{USER_PROMPT}}"
          temperature: "{{TEMPERATURE}}"
          max_tokens: "{{MAX_TOKENS}}"
          response_format:
            type: "json_object"
        retryPolicy:
          maxRetries: 2
          retryableStatusCodes:
            - 408
            - 429
            - 500
            - 502
            - 503
            - 504
      - name: "CHATGPT"
        enabled: true
        baseUrl: "https://api.openai.com/v1/chat/completions"
        authType: "BEARER"
        apiKeyBase64: ""
        model: "gpt-4o-mini"
        timeoutMs: 12000
        responseJsonpath: "$.choices[0].message.content"
        requestTemplate:
          model: "{{MODEL}}"
          messages:
            - role: "system"
              content: "{{SYSTEM_PROMPT}}"
            - role: "user"
              content: "{{USER_PROMPT}}"
          temperature: "{{TEMPERATURE}}"
          max_tokens: "{{MAX_TOKENS}}"
          response_format:
            type: "json_object"
        retryPolicy:
          maxRetries: 2
          retryableStatusCodes:
            - 408
            - 429
            - 500
            - 502
            - 503
            - 504
  security:
    integrationMasterKey: ${INTEGRATION_MASTER_KEY:2b5d3a9c1f7e4d8a6c0e9b1f5d7c3a2b8e6f4c1a9d7b5e3c2f8a1e6d4c0b9f2a}
  logging:
    request:
      enabled: true
      logStart: true
      logSuccess: true
      slowThresholdMs: 1500
      includePaths:
        - "/api"
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui
logging:
  level:
    ai.journa.prcontrol.service.IngestionService: DEBUG
    ai.journa.prcontrol.service.integration.GNewsProvider: DEBUG
