spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prcontrol
    username: prcontrol
    password: prcontrol
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
app:
  jwt:
    secret: "change-me-change-me-change-me-change-me"
    expirationSeconds: 3600
  news:
    ttlMinutes: 15
    failureThreshold: 3
    circuitMinutes: 30
    searchesPerMinute: 30
    gnews:
      apiKey: ${GNEWS_API_KEY:}
    rss:
      feeds:
        "Law":
          - "https://www.law.com/feed/"
          - "https://www.abajournal.com/feed/"
