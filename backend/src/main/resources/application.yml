spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prcontrol
    username: prcontrol
    password: prcontrol
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
app:
  jwt:
    secret: "change-me-change-me-change-me-change-me"
    expirationSeconds: 3600
  news:
    ttlMinutes: 15
    failureThreshold: 3
    circuitMinutes: 30
    searchesPerMinute: 60
    refreshIntervalMinutes: 30
    gnews:
      baseUrl: "https://gnews.io/api/v4"
      requestTimeoutSeconds: 10
      maxBackoffSeconds: 30
  security:
    integrationMasterKey: ${INTEGRATION_MASTER_KEY:change-me-please}
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui
