spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prcontrol
    username: prcontrol
    password: prcontrol
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
app:
  jwt:
    secret: "change-me-change-me-change-me-change-me"
    expirationSeconds: 3600
  providers:
    news: mock
    media: mock
    email: mock
springdoc:
  swagger-ui:
    path: /swagger-ui
