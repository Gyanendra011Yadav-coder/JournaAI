spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prcontrol
    username: prcontrol
    password: prcontrol
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
app:
  cors:
    allowedOrigins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
  beats:
    - name: "Law"
      slug: "law"
    - name: "Taxation"
      slug: "taxation"
    - name: "Healthcare"
      slug: "healthcare"
    - name: "Education"
      slug: "education"
    - name: "Steel"
      slug: "steel"
    - name: "Finance/BFSI"
      slug: "finance-bfsi"
    - name: "Startups/VC"
      slug: "startups-vc"
    - name: "Technology/AI"
      slug: "technology-ai"
    - name: "Telecom"
      slug: "telecom"
    - name: "Energy & Renewables"
      slug: "energy-renewables"
    - name: "Manufacturing/Industrial"
      slug: "manufacturing-industrial"
    - name: "Pharma/MedTech"
      slug: "pharma-medtech"
    - name: "Real Estate & Infra"
      slug: "real-estate-infra"
    - name: "Retail/Consumer"
      slug: "retail-consumer"
    - name: "Auto/EV"
      slug: "auto-ev"
    - name: "ESG/Sustainability"
      slug: "esg-sustainability"
    - name: "Public Policy/Regulatory"
      slug: "public-policy-regulatory"
  jwt:
    secret: "change-me-change-me-change-me-change-me"
    expirationSeconds: 3600
  news:
    ttlMinutes: 15
    failureThreshold: 3
    circuitMinutes: 30
    searchesPerMinute: 30
    gnews:
      apiKey: ${GNEWS_API_KEY:}
    rss:
      feeds:
        "Law":
          - "https://www.law.com/feed/"
          - "https://www.abajournal.com/feed/"
        "Taxation":
          - "https://www.irs.gov/rss"
          - "https://taxfoundation.org/feed/"
        "Healthcare":
          - "https://www.healthcareitnews.com/feed"
          - "https://www.modernhealthcare.com/feed/rss"
        "Education":
          - "https://www.edweek.org/education/rss"
          - "https://hechingerreport.org/feed/"
        "Steel":
          - "https://www.worldsteel.org/rss.xml"
          - "https://www.steel.org/feed/"
        "Finance/BFSI":
          - "https://www.reuters.com/finance/rss"
          - "https://www.finextra.com/rss/"
